name: Homik — Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip draft PRs — only run when marked ready for review
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "mcp__github__create_pending_pull_request_review,mcp__github__add_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__get_pull_request_diff"
            --model "claude-sonnet-4-5"
          show_full_output: true
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            Stack: FastAPI + SQLModel backend, React (Vite) PWA frontend, PostgreSQL via Neon.
            The developer is a self-taught career changer actively learning — explain your reasoning
            on non-obvious findings so they understand the why, not just the what.

            Data model: Household → User, Location, Category, Item → Batch (Item = product definition, Batch = units at a location with an expiry date).
            Isolation rule: wrong-household access must return 404, never 403 — 403 leaks whether the ID exists.
            This is a portfolio project — every pattern used should be explainable in an interview. Flag anything clever but hard to justify to a senior reviewer.

            Be terse. One sentence per inline comment — state the issue and the fix, nothing more.

            Follow these steps:
            1. Use mcp__github__create_pending_pull_request_review to begin a pending review
            2. Use mcp__github__get_pull_request_diff to get the changes
            3. Verify findings against the actual diff before commenting — don't flag something as
               missing if it's already present
            4. Use mcp__github__add_comment_to_pending_review for inline findings
            5. Use mcp__github__submit_pending_pull_request_review with event type "COMMENT" to publish

            Review for:
            - Security issues — especially data not scoped to household_id (critical)
            - Logic errors, missing DB constraints, unhandled edge cases (critical)
            - Missing input validation at API boundaries (important)
            - Anything that would break the mobile/PWA experience (important)
            - More idiomatic FastAPI/SQLModel/Python patterns (minor)

            Skip pure style nits that Ruff handles automatically.

            When submitting with mcp__github__submit_pending_pull_request_review, set the body to
            three sections only — **Critical** (must fix before merge), **Minor** (worth addressing),
            **Cost: $X.XX**. No "What I verified" section, no prose summary, no restatement of
            inline comments.
