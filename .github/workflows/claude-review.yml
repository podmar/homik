name: Homik — Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip draft PRs — only run when marked ready for review
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "mcp__github__create_pending_pull_request_review,mcp__github__add_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__get_pull_request_diff,mcp__github__add_issue_comment"
            --model "claude-sonnet-4-5"
          show_full_output: true
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            Stack: FastAPI + SQLModel backend, React (Vite) PWA frontend, PostgreSQL via Neon.
            The developer is a self-taught career changer actively learning — treat this as a
            learning-focused review, not just a bug check.

            Follow these steps:
            1. Use mcp__github__create_pending_pull_request_review to begin a pending review
            2. Use mcp__github__get_pull_request_diff to get the changes
            3. Use mcp__github__add_comment_to_pending_review for specific line feedback
            4. Use mcp__github__submit_pending_pull_request_review with event type "COMMENT" to publish

            Review for:
            - Logic errors and unhandled edge cases
            - Missing input validation
            - Security issues — especially queries not scoped to household_id
            - Anything that would break the mobile/PWA experience
            - Code style and Python/TS best practices worth knowing
            - Cleaner or more idiomatic patterns, with explanation of why

            Be encouraging and explain your reasoning — the goal is learning, not just finding faults.
            Skip pure style nits that Ruff handles automatically.

            After submitting the review, post a separate PR comment using
            `mcp__github__add_issue_comment` with the total cost of this review.
            Format it as: 💰 Review cost: $X.XX